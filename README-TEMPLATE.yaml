---
title: "Xcode App Template Usage Guide"

summary: |
  This repository is a starter template for iOS applications that use the
  Cloud Ops Works GitHub Actions and deployment conventions.
  It is not an example application by itself; you are expected to copy it,
  rename it, and fill in the Cloud Ops Works configuration files for your
  target platform and Xcode project.

what_this_template_gives_you:
  - "An Xcode project skeleton under 'I am Groot/' (rename for your app)"
  - "Cloud Ops Works CI/CD configuration in .cloudopsworks/"
  - "GitHub Actions workflows in .github/workflows/"
  - "Deployment input samples for multiple targets under .cloudopsworks/vars/"
  - "Device test scripts under device_tests/ and UITests target"
  - "Release/version helpers in Makefile"
  - "GitVersion presets for GitFlow and GitHub Flow under .cloudopsworks/"

repository_layout: |
  .
  ├── .cloudopsworks/
  │   ├── _VERSION
  │   ├── cloudopsworks-ci.yaml
  │   ├── gitversion_gitflow.yaml
  │   ├── gitversion_githubflow.yaml
  │   └── vars/
  │       ├── inputs-global.yaml
  │       └── inputs-XCODE-ENV.yaml
  ├── .github/workflows/
  ├── device_tests/
  ├── <YourApp>.xcodeproj/
  ├── <YourApp>/               # Main application source
  ├── <YourApp>UITests/        # UI test target
  ├── Makefile
  ├── README-TEMPLATE.yaml
  └── README.md

quick_start:
  step_1:
    title: "Create a repository from the template"
    description: |
      Use GitHub's 'Use this template' flow or copy the repository into a new repo.
      After cloning your new repository locally:
    commands:
      - "git clone <your-new-repo-url>"
      - "cd <your-new-repo>"

  step_2:
    title: "Rename the Xcode project"
    description: |
      Rename the example Xcode project and its targets to match your application name.
      Update the bundle identifier and team ID in Xcode or directly in the project file.
    actions:
      - "Rename 'I am Groot.xcodeproj' → '<YourApp>.xcodeproj'"
      - "Rename the main app folder and UITests folder to match"
      - "Update CFBundleIdentifier in project settings"
      - "Update the Apple Developer Team ID (dev_team) in .cloudopsworks/vars/inputs-global.yaml"

  step_3:
    title: "Bootstrap the version metadata"
    description: |
      The root Makefile provides a 'version' target that computes the semantic
      version from GitVersion and writes it to the VERSION file.
    commands:
      - "make version"

  step_4:
    title: "Set the base application metadata"
    description: |
      Review and update at minimum:
    files_to_update:
      - path: ".cloudopsworks/vars/inputs-global.yaml"
        fields:
          - "organization_name"
          - "organization_unit"
          - "environment_name"
          - "repository_owner"
          - "xcode.dev_team"
          - "xcode.product_bundle"
          - "xcode.schemes"
          - "xcode.export_options"
          - "cloud"
          - "cloud_type"
      - path: ".cloudopsworks/vars/inputs-XCODE-ENV.yaml"
        fields:
          - "environment"
          - "xcode.configuration"
          - "disable_deploy (remove if using device testing)"
      - path: "README.md"
        fields:
          - "Service/app description"

versioning:
  description: |
    This template ships two GitVersion presets so you can choose the branching
    model that best fits your team's delivery process.

  presets:
    gitflow:
      file: ".cloudopsworks/gitversion_gitflow.yaml"
      use_when: |
        Your delivery process uses branches such as:
          - develop
          - feature/*
          - release/*
          - hotfix/*
          - support/*
      branch_labels:
        develop: "alpha"
        release: "beta"
        hotfix: "beta"
        main: "(no label — strict semver)"

    githubflow:
      file: ".cloudopsworks/gitversion_githubflow.yaml"
      use_when: |
        Your delivery process is centered on:
          - main / master
          - short-lived feature branches merged via pull requests
          - optional release/* branches only

  selecting_a_preset:
    description: |
      Copy the preset you want into the expected filename, or update your
      automation to point to the desired preset explicitly.
    commands:
      gitflow: "cp .cloudopsworks/gitversion_gitflow.yaml .cloudopsworks/gitversion.yaml"
      githubflow: "cp .cloudopsworks/gitversion_githubflow.yaml .cloudopsworks/gitversion.yaml"

  local_version_helper:
    command: "make version"
    description: |
      Writes the computed version to VERSION without creating a git tag.
      Uses FullSemVer from GitVersion (no need to prepend 'v').

cloudopsworks_configuration:
  main_config_file: ".cloudopsworks/cloudopsworks-ci.yaml"
  description: |
    Controls the overall CI/CD pipeline behavior for this repository.

  key_sections:
    zipGlobs:
      description: "Glob patterns for build artifact packaging (default: build/build_artifacts/*.ipa)"

    config:
      description: "Repository governance settings"
      fields:
        branchProtection: "Enable GitHub branch protection rules"
        gitFlow.enabled: "Set true to enable GitFlow branching model"
        gitFlow.supportBranches: "Set true if you need long-running support branches"
        requiredReviewers: "Number of required reviewers before merge"
        reviewers: "List of GitHub users/teams that can approve PRs"
        owners: "List of GitHub users/teams that can push to protected branches"
        contributors: "Repository access grants by role (admin, push, pull, maintain, triage)"

    cd:
      description: "CD pipeline deployment mapping"
      deployment_triggers:
        develop: "Pushes to 'develop' branch → dev environment"
        test: "Pushes to 'release/**' branch → uat environment"
        prerelease: "Tag on 'release/**' (v*.*.*-[alpha|beta].*) → demo environment"
        release: "Tag on 'main|master' (v*.*.*) → prod environment"
        hotfix: "Tag on 'hotfix/**' → hotfix environment"
        support: "Tag on 'support/**' → matched support environment"

environment_input_files:
  location: ".cloudopsworks/vars/"

  inputs_global:
    file: "inputs-global.yaml"
    description: "Shared settings applied to all environments and pipelines"
    required_fields:
      organization_name: "Your organization name (replaces ORG_NAME)"
      organization_unit: "Your organization unit (replaces ORG_UNIT)"
      environment_name: "Environment label (replaces ENV_NAME)"
      repository_owner: "GitHub repository owner (replaces REPO_OWNER)"
      xcode.version: "Xcode version to build with (default: 16.4)"
      xcode.dev_team: "Apple Developer Team ID"
      xcode.product_bundle: "Product bundle identifier matching Xcode project"
      xcode.schemes: "List of Xcode schemes to build"
      xcode.sdks: "Target SDKs (e.g., iphoneos)"
      xcode.destinations: "Build destinations (e.g., generic/platform=iOS)"
      xcode.export_options: "Code signing and distribution export options"
      cloud: "Target cloud provider: aws | azure | gcp"
      cloud_type: "Deployment type (e.g., device-farm)"
      runner_set: "GitHub Actions runner (default: macos-latest)"
    optional_fields:
      xcode.extra_args: "Additional xcodebuild arguments"
      xcode.extra_targets: "Extra targets for device farm / test lab"
      xcode.build_for_testing: "Set true to build for device testing"
      xcode.unsigned: "Set true to skip code signing (e.g., simulator builds)"
      snyk.enabled: "Enable Snyk security scanning"
      semgrep.enabled: "Enable Semgrep SAST scanning"
      sonarqube.enabled: "Enable SonarQube code quality scanning"
      jira.enabled: "Enable JIRA release integration"
      dependencyTrack.enabled: "Enable Dependency Track SCA"

  inputs_xcode_env:
    file: "inputs-XCODE-ENV.yaml"
    description: "Per-environment overrides and cloud-specific deployment configuration"
    required_fields:
      environment: "Environment name (dev|uat|prod|demo)"
      xcode.configuration: "Xcode build configuration (Debug|Release)"
    optional_fields:
      disable_deploy: "Set true to skip device farm / test lab deployment step"
      runner_set: "Override runner for this environment (e.g., macos-15 for self-hosted)"

deployment_target_guidance:
  aws_device_farm:
    description: |
      Use when running XCTest or UI tests against physical iOS devices on AWS Device Farm.
    config_section: "aws block inside inputs-XCODE-ENV.yaml"
    key_fields:
      region: "AWS region where Device Farm is configured (must be us-west-2)"
      device_farm_name: "Name of the Device Farm project"
      device_farm_pool: "Device pool name (optional if specifying individual device)"
      device.form_factor: "PHONE or TABLET"
      device.model: "e.g., 'Apple iPhone 14 Pro'"
      device.os_version: "e.g., '17.3.1'"
      test_script_path: "Path to test script directory (e.g., device_tests)"
      test_script_type: "Test type (e.g., XCTEST_UI_TEST_PACKAGE)"
      sts_role_arn: "IAM role ARN for cross-account access (optional)"
      secrets_path_filter: "Path prefix for secrets filtering"
    tip: |
      To list available devices:
        aws devicefarm list-devices --region us-west-2 \
          --filters attribute=PLATFORM,operator=EQUALS,values=IOS \
          --query 'devices[].[model,formFactor,os]' --output table

  gcp_firebase_test_lab:
    description: |
      Use when running XCTest against physical iOS devices on Google Firebase Test Lab.
    config_section: "gcp block inside inputs-XCODE-ENV.yaml"
    key_fields:
      project_id: "GCP project ID"
      region: "GCP region"
      devices: "List of model_id / version_id / locale_id / orientation entries"
      test_lab_bucket: "GCS bucket for test results (bucket access required)"
      test_script_path: "Path to UITest bundle (e.g., 'I am GrootUITests')"
      test_script_type: "Test type: robo | xctest | game-loop"
      impersonate_sa: "Service account email for GCP impersonation"
    tip: |
      To list available iOS device models:
        gcloud firebase test ios models list

  azure:
    description: |
      Use when cloud secrets or resources are managed in Azure Key Vault alongside the build.
    config_section: "azure block inside inputs-XCODE-ENV.yaml"
    key_fields:
      resource_group: "Azure resource group"
      keyvault_name: "Azure Key Vault name"
      keyvault_secret_filter: "Secret name prefix to import"

  cloud_credentials_in_deploy_workflow:
    description: |
      The deploy workflow automatically injects cloud provider credentials as environment
      variables so that tronador-based deployment steps can access them without extra setup.
    injected_env_vars:
      AWS_ACCESS_KEY_ID: "${{ secrets.aws_access_key_id }}"
      AWS_SECRET_ACCESS_KEY: "${{ secrets.aws_secret_access_key }}"
      AWS_DEFAULT_REGION: "${{ inputs.default_aws_region }}"
      GOOGLE_CREDENTIALS: "${{ secrets.gcp_credentials }}"
      ARM_CLIENT_ID: "${{ secrets.azure_service_id }}"
      ARM_CLIENT_SECRET: "${{ secrets.azure_service_secret }}"

github_actions_workflows:
  location: ".github/workflows/"
  description: |
    You generally do NOT edit all workflows immediately. Configure the Cloud Ops Works
    input files first — most workflow behavior is driven from those YAML files.
  workflows:
    - name: "CI Build"
      trigger: "Pull requests and branch pushes"
      description: "Builds the Xcode project, runs linting, optional security scans"
    - name: "Deploy"
      trigger: "CD pipeline events (branch pushes, tags)"
      description: "Builds the IPA, signs it, uploads to device farm or test lab"
    - name: "Pull Request"
      trigger: "PR open/sync"
      description: "PR validation, auto-labeling, JIRA linking"
    - name: "Automerge"
      trigger: "PR approved"
      description: "Auto-merges approved PRs in GitFlow environments"
    - name: "Environment Cleanup"
      trigger: "Branch deletion / manual dispatch"
      description: "Tears down preview or transient deployment environments"

onboarding_sequence:
  steps:
    1: "Create a repository from this template using GitHub's 'Use this template' button"
    2: "Clone the new repository and rename the Xcode project and all related targets"
    3: "Update the Apple Developer Team ID and bundle identifier in inputs-global.yaml"
    4: "Choose your branching model and copy the appropriate GitVersion preset to gitversion.yaml"
    5: "Configure .cloudopsworks/cloudopsworks-ci.yaml (reviewers, branch protection, deployments)"
    6: "Fill in .cloudopsworks/vars/inputs-global.yaml with real organization and Xcode values"
    7: "Fill in .cloudopsworks/vars/inputs-XCODE-ENV.yaml for each environment"
    8: "Configure cloud-specific sections (aws / gcp / azure) as needed"
    9: "Update README.md to describe the actual iOS application"
    10: "Open the first PR and validate CI/CD pipeline behavior"

minimum_checklist_before_first_release:
  - "[ ] Xcode project, schemes, and targets are renamed from the example app"
  - "[ ] Apple Developer Team ID and bundle identifier are set in inputs-global.yaml"
  - "[ ] One GitVersion strategy is selected and copied to .cloudopsworks/gitversion.yaml"
  - "[ ] .cloudopsworks/cloudopsworks-ci.yaml matches your repo governance rules"
  - "[ ] All ORG_NAME / ORG_UNIT / ENV_NAME / REPO_OWNER placeholders are replaced"
  - "[ ] Cloud target (cloud: / cloud_type:) is set and environment-specific vars are filled"
  - "[ ] disable_deploy is removed or set correctly per environment"
  - "[ ] Code signing export options (export_options) are configured for distribution"
  - "[ ] README.md describes your actual iOS application"
  - "[ ] CI passes on a pull request"

notes_for_template_maintainers: |
  When changing template behavior:
  - Keep README-TEMPLATE.yaml aligned with files that actually exist in the repo.
  - Document any new required placeholders or bootstrap steps.
  - Document changes to Xcode version defaults (xcode.version in inputs-global.yaml).
  - Document changes to branching / versioning conventions, especially between GitFlow
    and GitHub Flow presets.
  - Call out whether downstream repos must copy, rename, or re-select preset files.
  - When adding new cloud targets, add corresponding guidance under
    deployment_target_guidance and update inputs-XCODE-ENV.yaml.
  - The patch-management workflow has been removed; AI-driven patching is no longer
    part of this template's default surface area.
